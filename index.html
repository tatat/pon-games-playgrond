<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Pon Pon Games Playground</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #000;
      }
      body {
        touch-action: none;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        color: #fff;
        /* Suppress iOS Safari's long-press callout (image / link preview,
           copy menu) so holding a vkeypad button doesn't open a system
           overlay over the game. */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
