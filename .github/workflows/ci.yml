name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Multiple pushes to the same ref cancel any in-flight CI on that ref so
# we don't burn minutes on stale revisions.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: read source, nothing else needs to be writable.
permissions:
  contents: read

jobs:
  check:
    name: Lint / type-check / test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pin to the major Node version the devcontainer uses (26.x).
          # Bumping requires updating `.devcontainer/devcontainer.json` too.
          node-version: '26'
          cache: 'npm'

      # `.npmrc` has `ignore-scripts=true` for supply-chain hygiene, so
      # `npm ci` won't run install-time hooks. `npm run prepare` would
      # set up husky locally — CI doesn't commit, so we skip it.
      - run: npm ci

      - run: npm run lint

      - run: npm run type-check

      - run: npm test
