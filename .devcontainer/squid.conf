http_port 3128

cache deny ALL

access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# Outbound HTTPS / HTTP allowlist. To add a domain, edit and either rebuild the
# container or run:
#   sudo squid -k reconfigure -f "${WORKSPACE_FOLDER}/.devcontainer/squid.conf"
#
# Multiple `acl allowed_domains dstdomain ...` lines extend the same ACL, which
# lets us keep section comments without breaking continuation parsing.

# git / gh / Pages
acl allowed_domains dstdomain .github.com .githubusercontent.com .githubassets.com

# npm + supply-chain proxy
acl allowed_domains dstdomain .flatt.tech .npmjs.org .npmjs.com .r2.cloudflarestorage.com

# Node + asdf
acl allowed_domains dstdomain nodejs.org

# apt / system
acl allowed_domains dstdomain deb.debian.org security.debian.org
acl allowed_domains dstdomain ports.ubuntu.com

# VS Code (devcontainer users)
acl allowed_domains dstdomain marketplace.visualstudio.com update.code.visualstudio.com .blob.core.windows.net

# Claude Code
acl allowed_domains dstdomain .anthropic.com claude.ai downloads.claude.ai platform.claude.com code.claude.com

# Codex / OpenAI auth
acl allowed_domains dstdomain .openai.com .chatgpt.com login.microsoftonline.com accounts.google.com .googleapis.com

# GitHub Copilot CLI
acl allowed_domains dstdomain .githubcopilot.com

# Google Fonts (rally-runner score font): the CSS host fonts.googleapis.com is
# already covered by .googleapis.com above; the woff2 files come from gstatic.
acl allowed_domains dstdomain .gstatic.com

# Library docs / llms.txt (agent reading material)
acl allowed_domains dstdomain .pixijs.com .rapier.rs .react.dev .vite.dev .vitejs.dev .vitest.dev
acl allowed_domains dstdomain .biomejs.dev .pmnd.rs .typescriptlang.org .developer.mozilla.org .shisho.dev

# Playwright browser downloads (npx playwright install)
# Chrome for Testing does not ship a linux-arm64 build; Playwright's
# own arm64 chromium build from cdn.playwright.dev is the only option here.
acl allowed_domains dstdomain cdn.playwright.dev playwright.download.prss.microsoft.com

http_access allow allowed_domains
http_access deny all
